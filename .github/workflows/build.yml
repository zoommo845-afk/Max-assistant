name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: unzip -o MaxAssistant.zip
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.4
      - working-directory: JarvisAssistant
        run: gradle assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: MaxAssistant-apk
          path: JarvisAssistant/app/build/outputs/apk/debug/app-debug.apk
